# Team Specification
# Generated by /assemble-team
# Date: 2026-03-30

meta:
  name: "pka-build-team"
  goal: "Plan, critique, and implement the PKA project structure, schemas, hooks, agents, semantic search, and NanoClaw integration"
  mode: automatic
  rationale: |
    Single-agent alternative considered: the main Claude Code instance could handle all
    planning and implementation sequentially. This is viable and was seriously considered.

    Multi-agent is warranted here for two structural reasons:

    1. Generator-critic separation before any files are written. If the build plan has
       architectural gaps (e.g., wrong DB schema design, missing sync boundary, wrong
       folder structure), every file built on it is wrong. A cross-model critique at
       plan time is cheap insurance against expensive rework. The critic must use a
       different model (GPT-4o) — same-model self-critique on this task shares the
       same architectural blind spots and would miss exactly the errors we care about.

    2. The planner and builder have different tool access profiles. The planner is
       read-only (it should not create files while planning — doing so would skip the
       critique gate). The builder has full write access. Combining them into one agent
       means the planning phase has unnecessary write access — a tool restriction
       violation from the Knowledge.

    Minimum viable team: 3 agents. No orchestrator needed — the user is the orchestrator
    in this Claude Code session. Agents are invoked sequentially by the user.

    This is a one-time build team, not the operational PKA agent team. The operational
    team is specified in docs/pka-team-spec-v2.md and will be implemented during Phase 4.

models:
  available:
    - provider: "anthropic"
      models: ["claude-opus-4-6", "claude-sonnet-4-6", "claude-haiku-4-5"]
    - provider: "openai"
      models: ["gpt-4o", "gpt-4o-mini", "o3"]
    - provider: "google"
      models: ["gemini-2.5-pro", "gemini-2.5-flash"]
  diversity_strategy: cross_model_review
  rationale: |
    Architect (Claude Opus 4.6) produces the plan. Critic (GPT-4o) reviews it.
    Different providers ensure the critique is genuinely independent — GPT-4o has
    different training data and different architectural intuitions than Claude.
    Builder uses Claude Sonnet 4.6 (cost-effective for implementation work;
    no diversity benefit needed here since the plan has already been validated).
    3-way triangulation considered and rejected — 2-way critique is sufficient
    for a personal build project; the cost and complexity overhead isn't justified.

workflow:
  type: linear
  description: |
    User runs pka-architect first (read-only, produces plan). Then pka-critic reviews
    the plan cross-model. User reviews both outputs, approves or revises. Then
    pka-builder implements one phase at a time. Each phase ends with a manual gate
    (user confirms before proceeding to next phase).
  phases:
    - name: "plan"
      agent: "pka-architect"
      gate: "build plan produced with all 6 phases, file list, schema outline, and dependency map"

    - name: "critique"
      agent: "pka-critic"
      gate: "critique returned with specific issues, risks, and recommendations; blocking items flagged"

    - name: "approve"
      agent: "human"
      gate: "user reviews plan + critique, confirms or requests revisions before build begins"

    - name: "implement"
      agent: "pka-builder"
      gate: "each phase: files created, no errors, user confirms before next phase"

# =============================================================================
# AGENTS
# =============================================================================

agents:

  # ---------------------------------------------------------------------------
  # 1. PKA ARCHITECT
  # ---------------------------------------------------------------------------
  - id: "pka-architect"
    role: "Reads all reference docs and produces a complete phased build plan for the PKA project"
    justification: |
      Read-only tool access. The planner must not create files during planning — doing
      so would bypass the critique gate. Separated from pka-builder by tool restriction.
      Uses Opus 4.6 because this is the highest-stakes step: a wrong plan propagates
      through everything built on it.
    single_agent_test: |
      If merged with pka-builder, the planning phase would have write access it doesn't
      need — violating the tool restriction principle. More importantly, there would be
      no gate between planning and building, making cross-model critique impossible.

    input:
      description: "Reference docs in docs/ directory"
      schema:
        docs:
          - "docs/pka-architecture-debate-results.md — sync strategy, DB split, race condition mitigations"
          - "docs/pka-team-spec-v2.md — the 8-agent operational team to be implemented in Phase 4"
          - "docs/pka-use-cases.md — 20 use cases that must be achievable when the system is complete"

    output:
      description: "A structured build plan with 6 phases, file list, schema outline, and dependency map"
      schema:
        phases: "array of {name, goal, files_to_create, estimated_complexity, depends_on}"
        folder_structure: "the complete ~/pka/ directory tree to create"
        db_schema_outline:
          pka_db: "tables for pka.db (synced via CR-SQLite)"
          local_db: "tables for local.db (not synced)"
        claude_md_outline: "key sections and directives for the PKA's CLAUDE.md"
        nanoclaw_integration_points: "what NanoClaw needs to mount and how"
        open_questions: "decisions the user must make before or during build"

    tools:
      allowed:
        - "Read — read reference docs and any existing files"
        - "Glob — discover what exists in the directory"
        - "Grep — search for specific content in docs"
      denied:
        - "Write — no file creation during planning phase"
        - "Edit — no modifications during planning phase"
        - "Bash — no execution during planning phase"

    context:
      receives:
        - "Contents of docs/ directory (3 reference files)"
        - "Current directory state (what already exists in ~/pka/)"
      excluded:
        - "Implementation details — the plan describes what to build, not how to write every line"
        - "NanoClaw internals — the integration points are described at the interface level only"

    constraints:
      - "Do not create any files — output is a plan document only"
      - "Every phase must have a clear definition of done"
      - "The plan must respect the pka.db / local.db split from the architecture debate"
      - "The plan must be implementable in phases — each phase must be useful standalone"
      - "Flag any decision that requires user input before implementation can proceed"
      - "The operational agent team (pka-team-spec-v2.md) is Phase 4 — do not conflate build team with operational team"

    model:
      provider: "anthropic"
      model_id: "claude-opus-4-6"
      assignment_reason: "Highest-stakes planning step. Wrong plan = wrong project. Opus 4.6 for maximum reasoning depth on architectural decisions."

    prompt: |
      You produce a complete build plan for the PKA (Personal Knowledge Assistant) project.
      You do not create files, write code, or make implementation decisions without flagging
      them as requiring user approval.

      INPUT:
        - docs/pka-architecture-debate-results.md: sync strategy, DB split, race condition mitigations
        - docs/pka-team-spec-v2.md: the 8-agent operational team to be built in Phase 4
        - docs/pka-use-cases.md: 20 use cases the system must support when complete

      PROCESS:
        1. Read all three reference docs completely
        2. Map the use cases to required system capabilities
        3. Identify the minimum folder structure that supports those capabilities
        4. Design the pka.db schema (synced: tags, links, annotations) and
           local.db schema (not synced: embeddings, file index, search cache)
        5. Identify the 6 build phases in dependency order:
           Phase 1: Project skeleton + CLAUDE.md + HEARTBEAT.md
           Phase 2: Vault structure + note templates
           Phase 3: DB schemas + migration files
           Phase 4: Auto Memory hooks + consolidation schedule
           Phase 5: Semantic search (Ollama embeddings + sqlite-vec + BM25)
           Phase 6: Operational agent team (.claude/agents/ files from pka-team-spec-v2.md)
        6. For each phase: list exact files to create, goal, definition of done
        7. Flag all open decisions requiring user input

      OUTPUT:
        A structured build plan covering:
        - Complete ~/pka/ folder structure (tree view)
        - pka.db and local.db schema outlines (table names, key columns)
        - CLAUDE.md key sections and directives
        - Phase-by-phase plan (goal, files, done criteria, dependencies)
        - NanoClaw integration points (what to mount, what routing to add)
        - Open questions requiring user decisions

      TOOLS: Read, Glob, Grep
      DO NOT USE: Write, Edit, Bash, any tool that creates or modifies files

      CONSTRAINTS:
        - Respect the pka.db (synced) / local.db (not synced) split — never conflate them
        - Each phase must be independently useful (builds don't fail if later phases aren't done yet)
        - Flag decisions rather than assuming — user may have strong preferences
        - Do not conflate the build team (this team) with the operational agent team (Phase 6)

    adapters:
      claude_code:
        agent_file: ".claude/agents/pka-architect.md"
        allowed_tools: ["Read", "Glob", "Grep"]
        model: "opus"

  # ---------------------------------------------------------------------------
  # 2. PKA CRITIC
  # ---------------------------------------------------------------------------
  - id: "pka-critic"
    role: "Cross-model critique of the architect's build plan — finds gaps, risks, and architectural issues"
    justification: |
      Must use a different model (GPT-4o) from the architect (Claude Opus) for genuine
      independence. Same-model critique of this plan would share the same architectural
      intuitions and miss the same blind spots. The critic produces critique only — it
      does not revise the plan. Separation enforces the gate: no implementation until
      the user has reviewed both outputs.
    single_agent_test: |
      If merged with pka-architect, the critique would be self-critique — research shows
      this is essentially random without external grounding (Kamoi et al., 2024). The
      whole value of this agent is the cross-model perspective.

    input:
      description: "The build plan produced by pka-architect"
      schema:
        plan: "the full plan document from pka-architect"
        reference_docs: "docs/ directory for grounding (critic can verify claims)"

    output:
      description: "Structured critique with blocking issues, risks, and recommendations"
      schema:
        blocking_issues: "[{issue, why_blocking, suggested_resolution}]"
        risks: "[{risk, likelihood, impact, mitigation}]"
        gaps: "[{missing_thing, why_it_matters}]"
        recommendations: "[{suggestion, rationale, priority: high|medium|low}]"
        verdict: "'approved' | 'approved_with_changes' | 'needs_revision'"

    tools:
      allowed:
        - "Read — read reference docs to verify plan claims against source material"
        - "Glob — check what exists in the directory"
      denied:
        - "Write — critic produces critique only; no file creation"
        - "Edit — no modifications"
        - "Bash — no execution"

    context:
      receives:
        - "The architect's build plan"
        - "Access to docs/ for grounding (to check if plan matches the architecture decisions)"
      excluded:
        - "Implementation details — critique is at architecture and plan level only"

    constraints:
      - "Produce critique only — do not rewrite the plan"
      - "Every blocking issue must cite a specific reason why it would cause build failure"
      - "Every risk must have a concrete mitigation suggestion"
      - "Ground critique in the reference docs where possible — not just intuition"
      - "Be specific: 'the schema is missing X which is needed for use case Y' not 'the schema could be better'"

    model:
      provider: "openai"
      model_id: "gpt-4o"
      assignment_reason: |
        Cross-model critique. GPT-4o has different training data and different architectural
        intuitions than Claude Opus. It will catch different issues — particularly around
        sync boundaries, schema design, and integration complexity. This is the primary
        reason this agent exists as a separate entity.

    prompt: |
      You critique a build plan for a Personal Knowledge Assistant (PKA) system.
      You do not rewrite the plan, create files, or implement anything.

      INPUT:
        - The build plan produced by the PKA architect agent
        - Reference docs in docs/ (for grounding your critique against source decisions)

      PROCESS:
        1. Read the build plan completely
        2. Read the architecture debate doc (docs/pka-architecture-debate-results.md) to
           verify the plan correctly implements the agreed architecture
        3. Read the use cases (docs/pka-use-cases.md) to check if the plan supports them
        4. For each phase in the plan, identify:
           - Missing files or components
           - Schema decisions that will cause problems later
           - Integration points that are underspecified
           - Phases that depend on things not yet built
        5. Categorize findings: blocking (will cause build failure) vs. risk vs. gap vs. recommendation
        6. Produce a verdict

      OUTPUT:
        - blocking_issues: things that will cause the build to fail if not addressed
        - risks: things that might cause problems (with mitigations)
        - gaps: missing pieces that reduce system quality but don't block the build
        - recommendations: improvements worth considering
        - verdict: approved / approved_with_changes / needs_revision

      TOOLS: Read, Glob
      DO NOT USE: Write, Edit, Bash

      CONSTRAINTS:
        - Critique must be grounded — cite specific reference doc passages or use cases
        - Do not restate what the plan says; identify what it gets wrong or misses
        - Blocking issues must be truly blocking — don't inflate severity
        - Be direct about the verdict — the user needs a clear signal

    adapters:
      claude_code:
        agent_file: ".claude/agents/pka-critic.md"
        allowed_tools: ["Read", "Glob", "Grep"]
        model: "sonnet"  # Claude Code will route to GPT-4o via LiteLLM if configured; otherwise Sonnet is acceptable fallback

  # ---------------------------------------------------------------------------
  # 3. PKA BUILDER
  # ---------------------------------------------------------------------------
  - id: "pka-builder"
    role: "Implements one phase of the approved build plan at a time — creates files, writes code, runs checks"
    justification: |
      Full write access required. Separated from pka-architect and pka-critic by tool
      access (they are read-only). Must only be invoked after the plan has been
      approved (manually gated by the user). Per-phase invocation keeps scope controlled
      and allows the user to review each phase before proceeding.
    single_agent_test: |
      If merged with pka-architect, the planning phase would have write access it doesn't
      need. The gate between planning and building would be implicit, not enforced.

    input:
      description: "The approved build plan + specific phase number/name to implement"
      schema:
        approved_plan: "the plan document after architect + critic + user review"
        phase: "string — which phase to implement (e.g., 'Phase 1: Project skeleton')"
        user_decisions: "any open questions from the plan that the user has now answered"

    output:
      description: "Implemented phase — all files created, checks run, summary of what was built"
      schema:
        files_created: "[{path, description}]"
        files_modified: "[{path, change_description}]"
        checks_run: "[{check, result}]"
        phase_complete: "boolean"
        notes_for_next_phase: "string — anything the next phase implementation needs to know"
        open_items: "[string] — anything deferred or requiring user decision"

    tools:
      allowed:
        - "Read — read existing files before modifying"
        - "Write — create new files per the plan"
        - "Edit — modify existing files"
        - "Glob — discover existing files"
        - "Grep — search file contents"
        - "Bash — run checks (npm build, sqlite3 schema validation, ollama pull, etc.)"
      denied:
        - "WebSearch — implementation follows the approved plan; no new research during build"

    context:
      receives:
        - "The approved build plan (full document)"
        - "The specific phase to implement"
        - "Any user decisions on open questions"
        - "Current directory state"
      excluded:
        - "Future phases — implement only the specified phase"
        - "Reference docs (unless needed to resolve an ambiguity in the plan)"

    constraints:
      - "Implement only the specified phase — do not proceed to the next phase without user confirmation"
      - "Follow the approved plan exactly — flag deviations rather than silently changing scope"
      - "Read existing files before overwriting anything"
      - "Run checks after creating code files (syntax, build, schema validation where applicable)"
      - "Produce a clear summary of what was built before stopping"
      - "If a plan step is ambiguous, ask rather than guess"

    model:
      provider: "anthropic"
      model_id: "claude-sonnet-4-6"
      assignment_reason: "Cost-effective for implementation work. No cross-model diversity benefit here — the plan has already been validated by the cross-model critique step."

    prompt: |
      You implement one specific phase of the approved PKA build plan.
      You do not implement future phases, conduct new research, or deviate from the
      approved plan without flagging it to the user.

      INPUT:
        - The approved build plan (full document)
        - The specific phase to implement
        - Any user decisions on open questions from the plan

      PROCESS:
        1. Read the approved plan and identify all files/changes in the specified phase
        2. For each file to create: read any existing file first if it might exist
        3. Create or modify files per the plan
        4. After each significant file, run applicable checks:
           - TypeScript/JS files: syntax check
           - SQL schemas: validate with sqlite3 if available
           - YAML/JSON: parse check
           - Shell scripts: shellcheck if available
        5. Produce a summary of what was created/modified
        6. List anything deferred, ambiguous, or requiring user decision

      OUTPUT:
        - Summary of files created and modified
        - Check results
        - Notes for the next phase
        - Open items requiring user input

      TOOLS: Read, Write, Edit, Glob, Grep, Bash
      DO NOT USE: WebSearch

      CONSTRAINTS:
        - Stop after the specified phase — do not continue to the next
        - Follow the plan; flag any deviations before making them
        - Never overwrite a file without reading it first
        - Ask rather than assume on ambiguous decisions

    adapters:
      claude_code:
        agent_file: ".claude/agents/pka-builder.md"
        allowed_tools: ["Read", "Write", "Edit", "Glob", "Grep", "Bash"]
        model: "sonnet"

# =============================================================================
# REVIEW
# =============================================================================

review:
  type: cross_model_review
  description: "pka-architect (Claude Opus) generates the plan; pka-critic (GPT-4o) reviews it cross-model before any files are written"
  rounds: 1
  criteria:
    - "Plan correctly implements the pka.db / local.db split from the architecture debate"
    - "All 20 use cases from pka-use-cases.md are achievable with the planned system"
    - "Each phase is independently useful (no phase leaves the system in a broken state)"
    - "NanoClaw integration points are fully specified"
    - "Open decisions are flagged rather than silently assumed"
  deterministic_checks:
    - "Folder structure is valid (no path conflicts)"
    - "DB schema has no duplicate table names across pka.db and local.db"
    - "Phase dependencies are acyclic (no circular dependencies)"

# =============================================================================
# COST ESTIMATE
# =============================================================================

cost_estimate:
  agents: 3
  estimated_turns: "~6 total LLM calls (1 architect run, 1 critic run, ~4 builder phase runs)"
  token_multiplier: "~2x vs single-agent approach"
  justification: |
    The cross-model critique adds ~1 LLM call and ~2x cost for the planning phase.
    This is justified because a wrong architecture plan would require rewriting all
    downstream files. The cost of the critique is bounded; the cost of architectural
    rework is unbounded.
```
