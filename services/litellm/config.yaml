# LiteLLM Proxy Configuration
# Docs: https://docs.litellm.ai/docs/proxy/configs
#
# API keys are read from environment variables.
# Set them in services/litellm/.env or pass via Docker.

model_list:
  # ── Anthropic (direct) ──────────────────────────────────────
  - model_name: claude-opus-4-6
    litellm_params:
      model: anthropic/claude-opus-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY

  # Aliases so NanoClaw's model directives (opus/sonnet/haiku) resolve
  - model_name: opus
    litellm_params:
      model: anthropic/claude-opus-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: haiku
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY

  # ── OpenAI ──────────────────────────────────────────────────
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: o3
    litellm_params:
      model: openai/o3
      api_key: os.environ/OPENAI_API_KEY

  - model_name: dall-e-3
    litellm_params:
      model: openai/dall-e-3
      api_key: os.environ/OPENAI_API_KEY

  - model_name: tts-1
    litellm_params:
      model: openai/tts-1
      api_key: os.environ/OPENAI_API_KEY

  - model_name: tts-1-hd
    litellm_params:
      model: openai/tts-1-hd
      api_key: os.environ/OPENAI_API_KEY

  # ── Google Gemini ───────────────────────────────────────────
  - model_name: gemini-2.5-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GOOGLE_API_KEY

  - model_name: gemini-2.5-pro
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: os.environ/GOOGLE_API_KEY

  # ── DeepSeek ────────────────────────────────────────────────
  - model_name: deepseek-v3.2
    litellm_params:
      model: deepseek/deepseek-chat   # LiteLLM's name for latest DeepSeek V3 series
      api_key: os.environ/DEEPSEEK_API_KEY

  # ── MiniMax ─────────────────────────────────────────────────
  - model_name: minimax-m2.5
    litellm_params:
      model: minimax/MiniMax-M2.5
      api_key: os.environ/MINIMAX_API_KEY

  # ── Moonshot / Kimi ─────────────────────────────────────────
  - model_name: kimi-k2.5
    litellm_params:
      model: openrouter/moonshot/kimi-k2
      api_key: os.environ/OPENROUTER_API_KEY

  # ── Gemini Flash-Lite (cheap heartbeat tasks only) ──────────
  - model_name: gemini-flash-lite
    litellm_params:
      model: gemini/gemini-2.5-flash-lite-preview-06-17
      api_key: os.environ/GOOGLE_API_KEY

  # ── fal.ai (Flux + Ideogram) ────────────────────────────────
  - model_name: flux-pro
    litellm_params:
      model: fal_ai/fal-ai/flux-pro/v1.1-ultra
      api_key: os.environ/FAL_AI_API_KEY

  - model_name: ideogram-v3
    litellm_params:
      model: fal_ai/ideogram/v3
      api_key: os.environ/FAL_AI_API_KEY

  # ── Local Ollama ────────────────────────────────────────────
  - model_name: local-coder
    litellm_params:
      model: ollama/qwen2.5-coder:3b
      api_base: http://host.docker.internal:11434

  - model_name: local-general
    litellm_params:
      model: ollama/gemma3:4b
      api_base: http://host.docker.internal:11434

litellm_settings:
  drop_params: true      # Strips unsupported params (cache_control, output_config, etc.)
  num_retries: 2         # Retry each model before triggering fallback
  request_timeout: 300   # 5 min for long agent queries
  fallbacks:             # If primary fails after retries → fall back to claude-sonnet-4-6
    - deepseek-v3.2: [claude-sonnet-4-6]
    - minimax-m2.5: [claude-sonnet-4-6]
    - kimi-k2.5: [claude-sonnet-4-6]
    - gemini-flash-lite: [claude-sonnet-4-6]
  allowed_fails: 3       # Cooldown model after 3 failures/min
  cooldown_time: 60      # Cooldown duration in seconds

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
