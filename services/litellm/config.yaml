# LiteLLM Proxy Configuration
# Docs: https://docs.litellm.ai/docs/proxy/configs
#
# API keys are read from environment variables.
# Set them in services/litellm/.env or pass via Docker.

model_list:
  # ── Anthropic (direct) ──────────────────────────────────────
  - model_name: claude-opus-4-6
    litellm_params:
      model: anthropic/claude-opus-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY

  # Aliases so NanoClaw's model directives (opus/sonnet/haiku) resolve
  - model_name: opus
    litellm_params:
      model: anthropic/claude-opus-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: haiku
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY

  # ── OpenAI ──────────────────────────────────────────────────
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: o3
    litellm_params:
      model: openai/o3
      api_key: os.environ/OPENAI_API_KEY

  # ── Google Gemini ───────────────────────────────────────────
  - model_name: gemini-2.5-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GOOGLE_API_KEY

  - model_name: gemini-2.5-pro
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: os.environ/GOOGLE_API_KEY

  # ── Local Ollama ────────────────────────────────────────────
  # Uncomment when Ollama is running locally
  # - model_name: llama3
  #   litellm_params:
  #     model: ollama/llama3
  #     api_base: http://localhost:11434
  #
  # - model_name: deepseek-r1
  #   litellm_params:
  #     model: ollama/deepseek-r1
  #     api_base: http://localhost:11434

litellm_settings:
  drop_params: true  # Drop unsupported params instead of erroring
  num_retries: 2
  request_timeout: 300  # 5 min for long agent queries

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
